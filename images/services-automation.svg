<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <linearGradient id="sa-tealGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2B6777"/>
      <stop offset="100%" stop-color="#3d8a9c"/>
    </linearGradient>
    <linearGradient id="sa-goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#D4A853"/>
      <stop offset="100%" stop-color="#c99a3f"/>
    </linearGradient>
    <linearGradient id="sa-bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDFAF5" stop-opacity="0"/>
      <stop offset="100%" stop-color="#2B6777" stop-opacity="0.03"/>
    </linearGradient>
    <filter id="sa-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#2B6777" flood-opacity="0.15"/>
    </filter>
  </defs>

  <rect width="400" height="300" fill="url(#sa-bgGrad)"/>

  <!-- Subtle grid -->
  <g opacity="0.05">
    <pattern id="sa-grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0" y2="40" stroke="#2B6777" stroke-width="0.5"/>
      <line x1="0" y1="0" x2="40" y2="0" stroke="#2B6777" stroke-width="0.5"/>
    </pattern>
    <rect width="400" height="300" fill="url(#sa-grid)"/>
  </g>

  <!-- Flow arrows/connections -->
  <g stroke="#3d8a9c" stroke-width="1.5" fill="none" opacity="0.35">
    <!-- Top row connections -->
    <path d="M105,85 L155,85" marker-end="url(#sa-arrow)"/>
    <path d="M235,85 L285,85" marker-end="url(#sa-arrow)"/>
    <!-- Vertical connections -->
    <path d="M80,110 L80,140" marker-end="url(#sa-arrow)"/>
    <path d="M200,110 L200,140" marker-end="url(#sa-arrow)"/>
    <path d="M320,110 L320,140" marker-end="url(#sa-arrow)"/>
    <!-- Bottom row connections -->
    <path d="M105,170 L155,170" marker-end="url(#sa-arrow)"/>
    <path d="M235,170 L285,170" marker-end="url(#sa-arrow)"/>
    <!-- Converging to output -->
    <path d="M200,195 L200,225" marker-end="url(#sa-arrow)"/>
    <path d="M80,195 Q80,225 160,245" marker-end="url(#sa-arrow)"/>
    <path d="M320,195 Q320,225 240,245" marker-end="url(#sa-arrow)"/>
  </g>

  <!-- Arrow marker -->
  <defs>
    <marker id="sa-arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 8 5 L 0 9" fill="none" stroke="#3d8a9c" stroke-width="1.5"/>
    </marker>
  </defs>

  <!-- Top row - Input nodes -->
  <g filter="url(#sa-shadow)">
    <!-- Node 1 - Data input -->
    <rect x="50" y="60" width="60" height="50" rx="8" fill="#FDFAF5" stroke="#2B6777" stroke-width="1.5"/>
    <g transform="translate(80, 85)" stroke="#2B6777" stroke-width="1.5" fill="none">
      <rect x="-12" y="-10" width="24" height="20" rx="2"/>
      <line x1="-7" y1="-4" x2="7" y2="-4"/>
      <line x1="-7" y1="0" x2="5" y2="0"/>
      <line x1="-7" y1="4" x2="7" y2="4"/>
    </g>

    <!-- Node 2 - Process -->
    <rect x="170" y="60" width="60" height="50" rx="8" fill="#FDFAF5" stroke="#2B6777" stroke-width="1.5"/>
    <g transform="translate(200, 85)" stroke="#2B6777" stroke-width="1.5" fill="none">
      <circle r="11"/>
      <path d="M-4,-4 L-4,5 L5,0 Z" fill="#3d8a9c" stroke="none"/>
    </g>

    <!-- Node 3 - AI/Brain -->
    <rect x="290" y="60" width="60" height="50" rx="8" fill="#FDFAF5" stroke="#2B6777" stroke-width="1.5"/>
    <g transform="translate(320, 85)" stroke="#2B6777" stroke-width="1.5" fill="none">
      <path d="M-10,6 Q-10,-10 0,-10 Q10,-10 10,6"/>
      <line x1="-10" y1="6" x2="10" y2="6"/>
      <circle cx="-4" cy="-2" r="1.5" fill="#D4A853" stroke="none"/>
      <circle cx="4" cy="-2" r="1.5" fill="#D4A853" stroke="none"/>
    </g>
  </g>

  <!-- Middle row - Processing nodes -->
  <g filter="url(#sa-shadow)">
    <!-- Node 4 -->
    <rect x="50" y="145" width="60" height="50" rx="8" fill="#FDFAF5" stroke="#3d8a9c" stroke-width="1.5"/>
    <g transform="translate(80, 170)" stroke="#3d8a9c" stroke-width="1.5" fill="none">
      <path d="M-8,-8 L8,-8 L8,8 L-8,8 Z"/>
      <path d="M-3,-3 L3,-3 L3,3 L-3,3 Z" fill="#3d8a9c" opacity="0.3"/>
    </g>

    <!-- Node 5 - Central gear -->
    <rect x="170" y="145" width="60" height="50" rx="8" fill="#FDFAF5" stroke="#2B6777" stroke-width="2"/>
    <g transform="translate(200, 170)">
      <circle r="8" fill="none" stroke="#2B6777" stroke-width="1.5"/>
      <circle r="3" fill="#D4A853" opacity="0.8"/>
      <!-- Gear teeth -->
      <g stroke="#2B6777" stroke-width="1.5">
        <line x1="0" y1="-8" x2="0" y2="-11"/>
        <line x1="0" y1="8" x2="0" y2="11"/>
        <line x1="-8" y1="0" x2="-11" y2="0"/>
        <line x1="8" y1="0" x2="11" y2="0"/>
        <line x1="-5.7" y1="-5.7" x2="-7.8" y2="-7.8"/>
        <line x1="5.7" y1="5.7" x2="7.8" y2="7.8"/>
        <line x1="-5.7" y1="5.7" x2="-7.8" y2="7.8"/>
        <line x1="5.7" y1="-5.7" x2="7.8" y2="-7.8"/>
      </g>
    </g>

    <!-- Node 6 -->
    <rect x="290" y="145" width="60" height="50" rx="8" fill="#FDFAF5" stroke="#3d8a9c" stroke-width="1.5"/>
    <g transform="translate(320, 170)" stroke="#3d8a9c" stroke-width="1.5" fill="none">
      <path d="M-8,6 L-8,-4 L0,-8 L8,-4 L8,6 Z"/>
      <line x1="-8" y1="6" x2="8" y2="6"/>
    </g>
  </g>

  <!-- Output node -->
  <g filter="url(#sa-shadow)">
    <rect x="160" y="230" width="80" height="50" rx="10" fill="url(#sa-tealGrad)" opacity="0.9"/>
    <g transform="translate(200, 255)">
      <polyline points="-10,0 -3,7 10,-7" fill="none" stroke="#FDFAF5" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- Gold accent decorations -->
  <circle cx="140" cy="130" r="3" fill="#D4A853" opacity="0.5"/>
  <circle cx="260" cy="130" r="3" fill="#D4A853" opacity="0.5"/>
  <circle cx="140" cy="215" r="2.5" fill="#D4A853" opacity="0.4"/>
  <circle cx="260" cy="215" r="2.5" fill="#D4A853" opacity="0.4"/>

  <!-- Decorative corner elements -->
  <g opacity="0.1" stroke="#2B6777" stroke-width="1" fill="none">
    <path d="M15,15 L15,35 M15,15 L35,15"/>
    <path d="M385,15 L385,35 M385,15 L365,15"/>
    <path d="M15,285 L15,265 M15,285 L35,285"/>
    <path d="M385,285 L385,265 M385,285 L365,285"/>
  </g>
</svg>
# LayerOps Multi-Tenant Client Chatbot Worker
# Deploy with: npx wrangler deploy -c workers/client-chat/wrangler-clients.toml

name = "layerops-clients"
main = "worker.js"
compatibility_date = "2024-01-01"

[[kv_namespaces]]
binding = "CLIENTS"
id = "8f8f82f39ade45f2914bd9ec34ec9ea1"

[[routes]]
pattern = "*.layerops.tech/*"
zone_name = "layerops.tech"
